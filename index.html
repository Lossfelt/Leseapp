<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leseapp</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <h1 id="appTitle" class="app-title">Leseapp</h1>
      </section>

      <section class="control-panel">
        <div class="file-card">
          <label class="file-picker" for="fileInput">Velg tekst eller EPUB</label>
          <input
            id="fileInput"
            type="file"
            accept=".txt,.epub,text/plain,application/epub+zip"
          />
        </div>

        <div class="speed-card">
          <button id="speedToggle" class="speed-header speed-toggle" type="button">
            <span class="speed-label">Hastighet</span>
            <strong id="speedValue" class="speed-reading">320 WPM</strong>
          </button>
        </div>
      </section>

      <div id="speedControls" class="speed-controls is-collapsed">
        <input
          id="speedSlider"
          type="range"
          min="120"
          max="900"
          value="320"
          step="10"
          aria-label="Juster lesehastighet"
        />
      </div>

      <section class="reader-card">
        <div class="reader-meta">
          <p id="statusText" class="status-pill">Last inn en tekst for å starte.</p>
          <p id="progressText" class="progress-text">0 / 0 ord</p>
        </div>

        <div class="reader-stage" aria-live="polite">
          <div class="focus-guide"></div>
          <div class="word-stack">
            <p id="prevWordDisplay" class="ghost-word ghost-word-top"></p>
            <p id="wordDisplay" class="word-display">Klar</p>
            <p id="nextWordDisplay" class="ghost-word ghost-word-bottom"></p>
          </div>
        </div>

        <div class="primary-actions">
          <button id="playButton" class="play-button" type="button" disabled>
            Start / Pause
          </button>
        </div>

        <div class="chapter-nav">
          <button id="prevSectionButton" class="secondary-button" type="button" disabled>
            Forrige kapittel
          </button>
          <p id="sectionLabel" class="section-label">Ingen kapitler funnet ennå.</p>
          <button id="nextSectionButton" class="secondary-button" type="button" disabled>
            Neste kapittel
          </button>
        </div>
      </section>

      <section id="contextPanel" class="context-card is-empty">
        <div class="context-header">
          <p class="eyebrow">Kontekst</p>
          <div class="context-toolbar">
            <button id="contextToggle" class="context-toggle" type="button" disabled>
              Utvid tekstvindu
            </button>
            <p id="contextHint" class="muted">
              Panelet fylles når du åpner en tekst og pauser lesingen.
            </p>
          </div>
        </div>
        <div id="contextBody" class="context-body"></div>
      </section>
    </main>

    <footer class="app-footer">
      <button id="darkModeToggle" class="dark-mode-toggle" type="button">
        Mørk modus
      </button>
    </footer>

    <script src="./vendor/jszip.min.js"></script>
    <script src="./reading-model.js"></script>
    <script src="./epub-loader.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
