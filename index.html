<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leseapp</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <h1 id="appTitle" class="app-title">Leseapp</h1>
      </section>

      <section class="control-panel">
        <div class="file-card">
          <button id="importToggle" class="file-picker" type="button">Velg tekst eller EPUB</button>
          <input
            id="fileInput"
            type="file"
            accept=".txt,.epub,text/plain,application/epub+zip"
          />
        </div>

        <div class="speed-card">
          <button id="speedToggle" class="speed-header speed-toggle" type="button">
            <span class="speed-label">Hastighet</span>
            <strong id="speedValue" class="speed-reading">320 WPM</strong>
          </button>
        </div>
      </section>

      <div id="speedControls" class="speed-controls is-collapsed">
        <div class="settings-row">
          <div class="settings-row-header">
            <label for="speedSlider">Hastighet</label>
            <strong id="speedSliderValue">320 WPM</strong>
          </div>
          <div class="slider-stepper">
            <button class="step-button" type="button" data-step-target="speedSlider" data-step="-10" aria-label="Senk lesehastighet">-</button>
            <input
              id="speedSlider"
              type="range"
              min="120"
              max="900"
              value="320"
              step="10"
              aria-label="Juster lesehastighet"
            />
            <button class="step-button" type="button" data-step-target="speedSlider" data-step="10" aria-label="Øk lesehastighet">+</button>
          </div>
        </div>

        <div class="settings-row">
          <div class="settings-row-header">
            <label for="longWordBonusSlider">Ekstra tid på lange ord</label>
            <strong id="longWordBonusValue">28%</strong>
          </div>
          <div class="slider-stepper">
            <button class="step-button" type="button" data-step-target="longWordBonusSlider" data-step="-5" aria-label="Mindre ekstra tid på lange ord">-</button>
            <input
              id="longWordBonusSlider"
              type="range"
              min="0"
              max="100"
              value="28"
              step="5"
              aria-label="Juster ekstra tid på lange ord"
            />
            <button class="step-button" type="button" data-step-target="longWordBonusSlider" data-step="5" aria-label="Mer ekstra tid på lange ord">+</button>
          </div>
        </div>

        <div class="settings-row">
          <div class="settings-row-header">
            <label for="veryLongWordBonusSlider">Ekstra tid på veldig lange ord</label>
            <strong id="veryLongWordBonusValue">38%</strong>
          </div>
          <div class="slider-stepper">
            <button class="step-button" type="button" data-step-target="veryLongWordBonusSlider" data-step="-5" aria-label="Mindre ekstra tid på veldig lange ord">-</button>
            <input
              id="veryLongWordBonusSlider"
              type="range"
              min="0"
              max="120"
              value="38"
              step="5"
              aria-label="Juster ekstra tid på veldig lange ord"
            />
            <button class="step-button" type="button" data-step-target="veryLongWordBonusSlider" data-step="5" aria-label="Mer ekstra tid på veldig lange ord">+</button>
          </div>
        </div>
      </div>

      <section class="reader-card">
        <div class="reader-meta">
          <p id="statusText" class="status-pill">Last inn en tekst for å starte.</p>
          <p id="progressText" class="progress-text">0 / 0 ord</p>
        </div>

        <div class="reader-stage" aria-live="polite">
          <div class="focus-guide"></div>
          <div class="word-stack">
            <p id="prevWordDisplay" class="ghost-word ghost-word-top"></p>
            <p id="wordDisplay" class="word-display">Klar</p>
            <p id="nextWordDisplay" class="ghost-word ghost-word-bottom"></p>
          </div>
        </div>

        <div class="primary-actions">
          <button id="playButton" class="play-button" type="button" disabled>
            Start / Pause
          </button>
        </div>

        <div class="chapter-nav">
          <button id="prevSectionButton" class="secondary-button" type="button" disabled>
            Forrige kapittel
          </button>
          <p id="sectionLabel" class="section-label">Ingen kapitler funnet ennå.</p>
          <button id="nextSectionButton" class="secondary-button" type="button" disabled>
            Neste kapittel
          </button>
        </div>
      </section>

      <section id="contextPanel" class="context-card is-empty">
        <div class="context-header">
          <p class="eyebrow">Kontekst</p>
          <div class="context-toolbar">
            <button id="contextToggle" class="context-toggle" type="button" disabled>
              Utvid tekstvindu
            </button>
            <p id="contextHint" class="muted">
              Panelet fylles når du åpner en tekst og pauser lesingen.
            </p>
          </div>
        </div>
        <div id="contextBody" class="context-body"></div>
      </section>
    </main>

    <footer class="app-footer">
      <button id="darkModeToggle" class="dark-mode-toggle" type="button">
        Mørk modus
      </button>
    </footer>

    <dialog id="importDialog" class="import-dialog">
      <div class="import-dialog-content">
        <div class="import-dialog-header">
          <h2>Åpne tekst</h2>
          <button id="closeImportDialog" class="icon-button" type="button" aria-label="Lukk">×</button>
        </div>

        <div class="import-actions">
          <button id="chooseFileButton" class="secondary-button" type="button">
            Velg fil
          </button>
        </div>

        <label class="paste-label" for="pastedTextInput">Lim inn tekst</label>
        <textarea
          id="pastedTextInput"
          class="paste-input"
          rows="10"
          placeholder="Lim inn teksten du vil lese her."
        ></textarea>

        <div class="import-footer">
          <button id="loadPastedTextButton" class="play-button import-submit" type="button">
            Bruk innlimt tekst
          </button>
        </div>
      </div>
    </dialog>

    <script src="./vendor/jszip.min.js"></script>
    <script src="./reading-model.js"></script>
    <script src="./epub-loader.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
